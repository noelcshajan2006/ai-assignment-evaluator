<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assignment Evaluator</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    background: #f4f7fb;
}

.sidebar {
    width: 230px;
    height: 100vh;
    background: #2c3e50;
    color: white;
    padding: 20px;
}

.sidebar p {
    cursor: pointer;
    padding: 10px;
}

.sidebar p:hover {
    background: #34495e;
}

.main {
    flex: 1;
    padding: 30px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    max-width: 600px;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}

.btn-green {
    background: #27ae60;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
}

.btn-red {
    background: #e74c3c;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    margin-top: 10px;
}

.section {
    display: none;
}

.active {
    display: block;
}

.history-item {
    padding: 8px;
    border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>AI System</h2>
    <p onclick="showSection('evaluate')">📝 Evaluate</p>
    <p onclick="showSection('dashboard')">📊 Dashboard</p>
    <p onclick="showSection('history')">🕘 History</p>
    <p onclick="showSection('login')">🔐 Student Login</p>
    <p onclick="showSection('contact')">📩 Contact Faculty</p>
</div>

<!-- Main -->
<div class="main">

<!-- Evaluate -->
<div id="evaluate" class="section active">
    <div class="card">
        <h2>Evaluate Assignment</h2>

        <input type="text" id="name" placeholder="Student Name">
        <textarea id="content" placeholder="Paste assignment"></textarea>

        <label>Upload File (.txt)</label>
        <input type="file" id="fileInput">

        <button class="btn-green" onclick="submitAssignment()">Evaluate</button>
        <button class="btn-red" onclick="clearForm()">Clear</button>

        <div id="result"></div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="section">
    <h2>Dashboard</h2>
    <p>Total Evaluations: <span id="totalCount">0</span></p>
</div>

<!-- History -->
<div id="history" class="section">
    <h2>History</h2>
    <div id="historyBox"></div>
</div>

<!-- Login -->
<div id="login" class="section">
    <div class="card">
        <h2>Student Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-green" onclick="login()">Login</button>
        <p id="loginMsg"></p>
    </div>
</div>

<!-- Contact -->
<div id="contact" class="section">
    <div class="card">
        <h2>Contact Faculty</h2>
        <input type="text" id="studentName" placeholder="Your Name">
        <textarea id="message" placeholder="Write your message"></textarea>
        <button class="btn-green" onclick="sendMessage()">Send Message</button>
        <p id="contactMsg"></p>
    </div>
</div>

</div>

<script>
let fileContent = "";

/* Navigation */
function showSection(id) {
    document.querySelectorAll(".section").forEach(sec => {
        sec.classList.remove("active");
    });
    document.getElementById(id).classList.add("active");

    if (id === "history" || id === "dashboard") {
        updateHistory();
    }
}

/* File Upload */
document.getElementById("fileInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(event) {
        fileContent = event.target.result;
    };

    if (file) reader.readAsText(file);
});

/* Clear */
function clearForm() {
    document.getElementById("name").value = "";
    document.getElementById("content").value = "";
    document.getElementById("fileInput").value = "";
    fileContent = "";
}

/* Evaluate */
async function submitAssignment() {

    const name = document.getElementById("name").value;
    const textContent = document.getElementById("content").value;
    const content = fileContent || textContent;

    if (!name || !content) {
        alert("Fill all fields");
        return;
    }

    const resultDiv = document.getElementById("result");
    resultDiv.innerText = "⏳ Evaluating...";

    try {
        const res = await fetch("http://127.0.0.1:8000/evaluate", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ content })
        });

        const data = await res.json();

        resultDiv.innerText =
            "📊 Score: " + data.score + "\n\n" + data.result;

        updateHistory(); // reload from DB

    } catch {
        resultDiv.innerText = "❌ Backend error";
    }
}

/* History from DATABASE */
async function updateHistory() {
    const box = document.getElementById("historyBox");
    box.innerHTML = "Loading...";

    try {
        const res = await fetch("http://127.0.0.1:8000/history");
        const data = await res.json();

        box.innerHTML = "";

        data.forEach(item => {
            box.innerHTML += `
                <div class="history-item">
                    Score: ${item.score}
                </div>
            `;
        });

        document.getElementById("totalCount").innerText = data.length;

    } catch {
        box.innerHTML = "❌ Failed to load history";
    }
}

/* Login */
function login() {
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if (user === "student" && pass === "1234") {
        document.getElementById("loginMsg").innerText = "✅ Login Successful";
    } else {
        document.getElementById("loginMsg").innerText = "❌ Invalid Credentials";
    }
}

/* Contact */
function sendMessage() {
    const name = document.getElementById("studentName").value;
    const msg = document.getElementById("message").value;

    if (!name || !msg) {
        alert("Fill all fields");
        return;
    }

    document.getElementById("contactMsg").innerText =
        "✅ Message sent (demo)";
}

/* Load history on start */
window.onload = function() {
    updateHistory();
};
</script>

</body>
</html>
